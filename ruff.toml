# ruff.toml — root linter config for the entire TFE project
# Covers: kubescan/src/, kubescan/tests/, research/models/, research/scripts/

line-length = 100
target-version = "py310"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long — formatter handles this
    "B008",  # do not perform function calls in default arguments (click uses this)
    "UP007", # use X | Y for union types — requires runtime support; we use __future__.annotations
]

[lint.isort]
known-first-party = ["kubescan"]

[lint.per-file-ignores]
"research/**" = [
    "T201",    # print() allowed in research scripts
    "B006",    # mutable default arg — common in argparse scripts
    "RUF001",  # ambiguous unicode in f-strings — intentional in math output
    "RUF002",  # ambiguous unicode in docstrings — intentional (–, ×, α)
    "RUF003",  # ambiguous unicode in comments — intentional
    "E402",    # module import not at top — needed after sys.path.insert()
    "B905",    # zip() strict — research scripts have aligned lists by construction
]
"kubescan/tests/**" = [
    "S101",  # assert allowed in tests
]
